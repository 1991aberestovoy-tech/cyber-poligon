<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR-код: Киберполигон</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 28px;
        background: #f4f7f1;
        color: #18211e;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      main {
        width: min(100%, 760px);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1.05;
      }

      p {
        margin: 0 auto 24px;
        color: #52605b;
        font-size: 1.1rem;
        line-height: 1.5;
      }

      img {
        width: min(82vw, 420px);
        height: auto;
        border: 1px solid #cdd9d0;
        border-radius: 8px;
        padding: 18px;
        background: #ffffff;
      }

      a {
        display: block;
        margin-top: 18px;
        color: #1f8a61;
        font-weight: 800;
        overflow-wrap: anywhere;
      }

      @media print {
        body {
          background: #ffffff;
        }

        a {
          color: #18211e;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Киберполигон</h1>
      <p>Отсканируй QR-код и начни смену в команде безопасности.</p>
      <img src="qr-github-pages.svg" alt="QR-код для перехода в игру Киберполигон">
      <a href="https://1991aberestovoy-tech.github.io/cyber-poligon/">https://1991aberestovoy-tech.github.io/cyber-poligon/</a>
    </main>
  </body>
</html>
